<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>壁掛け風カレンダー ＆ ToDo連携</title>
<style>
  :root {
    /* システム共通カラー */
    --primary-color: #2c3e50;
    --border-color: #ddd;
    --bg-color: #fafafa;
    --text-color: #333;
    --danger-color: #e74c3c;
    --success-color: #2ecc71;
    --todo-color: #f39c12;
    
    /* カスタムテーマ用変数 */
    --theme-top-bg: #ffffff;
    --theme-top-text: #333333;
    --theme-grid-bg: #dddddd;
    --theme-bg-image: none;
    --theme-cell-opacity: 1;
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    background-color: var(--bg-color);
    color: var(--text-color);
    overflow: hidden;
  }

  .app-container {
    display: flex;
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* カレンダーエリア */
  .calendar-section { flex: 1; display: flex; flex-direction: column; min-width: 0; transition: width 0.3s; }

  /* ToDoサイドバー */
  .todo-sidebar {
    display: none; width: 320px; background: #fff; border-left: 1px solid var(--border-color);
    flex-direction: column; box-shadow: -2px 0 5px rgba(0,0,0,0.02);
  }
  .todo-sidebar.active { display: flex; }

  /* ヘッダー */
  .header {
    display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;
    background-color: var(--theme-top-bg); 
    color: var(--theme-top-text);
    border-bottom: 1px solid var(--border-color);
  }
  .header-left, .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .header h2 { margin: 0; font-size: 1.6rem; min-width: 130px; }
  
  button {
    background: #fff; border: 1px solid var(--border-color); padding: 8px 12px;
    border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s;
    color: #333;
  }
  button:hover { background: #f0f0f0; }
  .btn-primary { background: var(--primary-color); color: #fff; border: none; }
  .btn-primary:hover { background: #1a252f; }
  .btn-outline { border: 1px solid var(--primary-color); color: var(--primary-color); font-weight: bold; }
  .btn-outline:hover { background: var(--primary-color); color: #fff; }

  /* カレンダーグリッド */
  .weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
    font-weight: bold; padding: 10px 0; font-size: 0.9rem;
    background-color: var(--theme-top-bg);
    color: var(--theme-top-text);
    border-bottom: 1px solid var(--theme-grid-bg);
  }

  .days {
    flex: 1; display: grid; grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr; gap: 1px; overflow-y: auto;
    overscroll-behavior-y: contain; 
    
    background-color: var(--theme-grid-bg);
    background-image: var(--theme-bg-image);
    background-size: cover;
    background-position: center;
  }
  
  .day {
    padding: 5px; display: flex; flex-direction: column; overflow: hidden; 
    cursor: pointer; transition: background 0.1s; position: relative;
    background-color: rgba(255, 255, 255, var(--theme-cell-opacity));
  }
  .day:hover { background-color: rgba(249, 249, 249, var(--theme-cell-opacity)); }
  .day.empty { 
    background-color: rgba(244, 244, 244, var(--theme-cell-opacity)); 
    cursor: default; pointer-events: none; 
  }

  /* 日付数字・祝日スタイル */
  .date-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
  .date-number {
    font-size: 0.95rem; font-weight: bold; display: inline-block;
    width: 24px; height: 24px; text-align: center; line-height: 24px; border-radius: 50%;
  }
  .holiday-name { font-size: 0.65rem; color: var(--danger-color); flex: 1; text-align: right; line-height: 1.2; word-break: break-all; }
  
  .day.today .date-number { background-color: var(--primary-color); color: #fff; }
  .day.sunday:not(.today) .date-number,
  .day.holiday:not(.today) .date-number { color: var(--danger-color); }
  .day.saturday:not(.today):not(.holiday) .date-number { color: #3498db; }

  /* イベントアイテム */
  .events-container { 
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .events-container::-webkit-scrollbar { display: none; }
  .event {
    font-size: 0.75rem; padding: 3px 4px; border-radius: 4px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; border-left: 4px solid #999; background-color: #f0f0f0;
    pointer-events: none;
  }
  .event.all-day { color: #fff; border-left: none; }
  .event.todo { background-color: #fff; border: 1px solid #eee; border-left: 4px solid var(--todo-color); color: var(--text-color); }
  .event.todo.completed { text-decoration: line-through; opacity: 0.5; border-left-color: #ccc; }

  /* ToDoエリア */
  .todo-header { padding: 15px 20px; background-color: var(--primary-color); color: white; font-size: 1.1rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
  .mobile-close-todo { display: none; background: none; border: none; color: white; font-size: 1.5rem; padding: 0; cursor: pointer; line-height: 1; }
  .todo-list-container { flex: 1; overflow-y: auto; padding: 15px; }
  .todo-item { background: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; margin-bottom: 10px; display: flex; gap: 8px; align-items: flex-start; }
  .todo-item.completed { opacity: 0.5; }
  .todo-item.completed .todo-title { text-decoration: line-through; }
  .todo-checkbox { margin-top: 2px; width: 16px; height: 16px; flex-shrink: 0; }
  .todo-content { flex: 1; min-width: 0; }
  .todo-title { font-weight: bold; font-size: 0.9rem; margin-bottom: 4px; word-break: break-all; }
  .todo-deadline { font-size: 0.75rem; color: #666; display: flex; align-items: center; gap: 3px; }
  .todo-deadline.overdue { color: var(--danger-color); font-weight: bold; }
  .todo-delete { background: none; border: none; color: #999; cursor: pointer; padding: 2px; font-size: 1.1rem; }
  .todo-input-area { padding: 12px; border-top: 1px solid var(--border-color); background: #f9f9f9; }
  .todo-input-area input { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }

  /* モーダル共通 */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
  .modal { background: #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 380px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
  .modal h3 { margin-top: 0; margin-bottom: 15px; font-size: 1.2rem; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; font-weight: bold; color: #333; }
  .form-group input[type="text"], .form-group input[type="date"], .form-group input[type="time"], .form-group select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
  .form-group input[type="color"] { width: 100%; height: 40px; padding: 2px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
  .form-group input[type="range"] { width: 100%; cursor: pointer; }
  .checkbox-group { display: flex; align-items: center; gap: 5px; font-size: 0.95rem; white-space: nowrap; color: #333; }
  .checkbox-group input { width: auto; margin: 0; transform: scale(1.2); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
  
  .view-list { max-height: 250px; overflow-y: auto; margin-bottom: 15px; }
  .view-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; color: #333;}
  .view-item:last-child { border-bottom: none; }
  .category-list { max-height: 150px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #eee; border-radius: 4px; padding: 10px; color: #333;}
  .category-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px dashed #eee; font-size: 0.9rem; }
  .category-color-box { display: inline-block; width: 14px; height: 14px; border-radius: 3px; vertical-align: middle; margin-right: 6px; }
  .cat-action-btn { background: none; border: none; cursor: pointer; padding: 0 4px; font-size: 0.85rem; }
  .edit-cat-btn { color: #3498db; }
  .delete-cat-btn { color: var(--danger-color); }
  .add-category-box { display: flex; gap: 5px; }

  /* レスポンシブ対応 */
  @media (max-width: 768px) {
    .header { flex-direction: column; align-items: stretch; gap: 8px; padding: 10px; }
    .header-left, .header-right { justify-content: space-between; width: 100%; flex-wrap: wrap; }
    .header h2 { font-size: 1.2rem; min-width: 100px; }
    .header-right { justify-content: flex-end; gap: 5px; }
    button { padding: 6px 8px; font-size: 0.8rem; }
    .header-left > div { display: flex; gap: 5px; }
    .weekdays { font-size: 0.75rem; padding: 5px 0; }
    .day { padding: 2px; }
    .date-header { margin-bottom: 1px; }
    .date-number { width: 18px; height: 18px; line-height: 18px; font-size: 0.8rem; }
    .holiday-name { font-size: 0.5rem; letter-spacing: -0.5px; }
    .events-container { gap: 1px; }
    .event { font-size: 0.55rem; padding: 1px 2px; border-left-width: 2px; line-height: 1.1; border-radius: 2px; }
    .todo-sidebar.active { position: absolute; top: 0; right: 0; height: 100%; width: 85%; max-width: 320px; z-index: 500; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
    .mobile-close-todo { display: block; }
  }
</style>
</head>
<body>

<div class="app-container">
  <!-- カレンダーエリア -->
  <div class="calendar-section">
    <div class="header">
      <div class="header-left">
        <h2 id="monthYear"></h2>
        <div>
          <button id="prev">先月</button>
          <button id="todayBtn">今日</button>
          <button id="next">来月</button>
        </div>
      </div>
      <div class="header-right">
        <button id="toggleTodoBtn" class="btn-outline">📝 ToDo</button>
        <button id="openCategoryFilterBtn" class="btn-outline">🔍 一覧</button>
        <button id="manageCategoriesBtn">⚙️ ｶﾃｺﾞﾘ</button>
        <button id="openThemeBtn">🎨 ﾃｰﾏ</button>
      </div>
    </div>
    <div class="weekdays" id="weekdaysContainer">
      <!-- JSで動的に曜日を描画します -->
    </div>
    <div class="days" id="days"></div>
  </div>

  <!-- ToDoリストエリア -->
  <div class="todo-sidebar" id="todoSidebar">
    <div class="todo-header">
      <span>📝 ToDoリスト</span>
      <button id="mobileCloseTodoBtn" class="mobile-close-todo">×</button>
    </div>
    <div class="todo-list-container" id="todoList"></div>
    <div class="todo-input-area">
      <input type="text" id="newTodoTitle" placeholder="新しいタスクを入力">
      <input type="date" id="newTodoDeadline">
      <button id="addTodoBtn" class="btn-primary" style="width: 100%;">タスクを追加</button>
    </div>
  </div>
</div>

<!-- テーマ設定モーダル -->
<div class="modal-overlay" id="themeModalOverlay">
  <div class="modal">
    <h3>🎨 テーマ設定</h3>
    <div class="form-group">
      <label>カレンダーの始まり曜日</label>
      <select id="themeStartOfWeekVal" style="font-weight: bold;">
        <option value="0">日曜日始まり</option>
        <option value="1">月曜日始まり</option>
      </select>
    </div>
    <div class="form-group">
      <label>上部 (ツールバー・曜日) の背景色</label>
      <input type="color" id="themeTopBgVal">
    </div>
    <div class="form-group">
      <label>上部 (ツールバー・曜日) の文字色</label>
      <input type="color" id="themeTopTextVal">
    </div>
    <div class="form-group">
      <label>カレンダー (グリッド線) の背景色</label>
      <input type="color" id="themeGridBgVal">
    </div>
    <div class="form-group">
      <label>日付部分の背景画像</label>
      <input type="file" id="themeBgImageVal" accept="image/*">
      <button id="clearBgImageBtn" style="margin-top: 8px; width: 100%;">❌ 画像をクリア</button>
    </div>
    <div class="form-group">
      <label>日付マスの不透明度 (0〜100%)<br><span style="font-size:0.75rem; font-weight:normal; color:#666;">※画像を透かして見せたい場合は数値を下げてください</span></label>
      <input type="range" id="themeCellOpacityVal" min="0" max="100">
    </div>
    <div class="modal-actions">
      <button id="closeThemeBtn" class="btn-primary">閉じる</button>
    </div>
  </div>
</div>

<!-- 予定一覧(Day View)モーダル -->
<div class="modal-overlay" id="dayViewModalOverlay">
  <div class="modal">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h3 id="dayViewDateDisplay" style="margin: 0; font-size:1.1rem; color: #333;"></h3>
      <button id="closeDayViewBtn" style="background:none; border:none; font-size:1.5rem; cursor:pointer; padding:0; color:#666;">×</button>
    </div>
    <div class="view-list" id="dayViewList"></div>
    <div class="modal-actions" style="justify-content: center;">
      <button id="openAddEventBtn" class="btn-primary" style="width: 100%;">＋ この日に予定を追加</button>
    </div>
  </div>
</div>

<!-- カテゴリー別一覧(Filter)モーダル -->
<div class="modal-overlay" id="categoryFilterModalOverlay">
  <div class="modal">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h3 style="margin: 0; font-size:1.1rem; color: #333;">カテゴリー別 予定一覧</h3>
      <button id="closeCategoryFilterBtn" style="background:none; border:none; font-size:1.5rem; cursor:pointer; padding:0; color:#666;">×</button>
    </div>
    <div class="form-group">
      <select id="filterCategorySelect" style="font-weight: bold;"></select>
    </div>
    <div class="view-list" id="filteredEventList" style="max-height: 350px;"></div>
  </div>
</div>

<!-- 予定追加モーダル -->
<div class="modal-overlay" id="eventModalOverlay">
  <div class="modal">
    <h3 id="modalDateDisplay" style="color: #333;">予定を追加</h3>
    <div class="form-group"><label>タイトル (必須)</label><input type="text" id="eventTitle" placeholder="予定を入力"></div>
    <div class="form-group"><label>カテゴリー</label><select id="eventCategory"></select></div>
    <div class="form-group checkbox-group"><input type="checkbox" id="eventAllDay" checked><label for="eventAllDay">終日</label></div>
    <div id="timeInputs" style="display: none;">
      <div class="form-group"><label>開始時間 (必須)</label><input type="time" id="eventStartTime"></div>
      <div class="form-group"><label>終了時間 (任意)</label><input type="time" id="eventEndTime"></div>
    </div>
    <div class="modal-actions">
      <button id="cancelEventBtn">キャンセル</button>
      <button id="saveEventBtn" class="btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- ★修正: カテゴリー管理モーダル -->
<div class="modal-overlay" id="categoryModalOverlay">
  <div class="modal">
    <h3 style="color:#333;">カテゴリー管理</h3>
    <div class="category-list" id="categoryList"></div>
    <div class="form-group">
      <label id="categoryFormLabel">新規追加</label>
      <div class="add-category-box">
        <input type="color" id="newCategoryColor" value="#3498db" style="width: 40px; padding: 0;">
        <input type="text" id="newCategoryName" placeholder="カテゴリー名">
        <button id="addCategoryBtn" class="btn-primary">追加</button>
      </div>
      <button id="cancelEditCategoryBtn" style="display:none; width: 100%; margin-top: 5px;">編集をキャンセル</button>
    </div>
    <div class="modal-actions"><button id="closeCategoryBtn">閉じる</button></div>
  </div>
</div>

<script>
  // --- テーマ設定処理 (週始まりの設定を追加) ---
  const defaultTheme = {
    topBg: '#ffffff', topText: '#333333', gridBg: '#dddddd',
    bgImage: null, cellOpacity: 100, startOfWeek: 0 // 0:日曜日, 1:月曜日
  };
  let currentTheme = JSON.parse(localStorage.getItem('calendarTheme')) || defaultTheme;

  const rootStyles = document.documentElement.style;
  
  function applyTheme() {
    rootStyles.setProperty('--theme-top-bg', currentTheme.topBg);
    rootStyles.setProperty('--theme-top-text', currentTheme.topText);
    rootStyles.setProperty('--theme-grid-bg', currentTheme.gridBg);
    rootStyles.setProperty('--theme-cell-opacity', currentTheme.cellOpacity / 100);
    rootStyles.setProperty('--theme-bg-image', currentTheme.bgImage ? `url(${currentTheme.bgImage})` : 'none');
  }

  function saveTheme() {
    try {
      localStorage.setItem('calendarTheme', JSON.stringify(currentTheme));
    } catch (e) {
      alert('画像サイズが大きすぎるため保存できませんでした。よりファイルサイズの小さい画像を選択してください。');
      currentTheme.bgImage = null; applyTheme(); localStorage.setItem('calendarTheme', JSON.stringify(currentTheme));
    }
  }

  const themeModalOverlay = document.getElementById('themeModalOverlay');
  const themeStartOfWeekVal = document.getElementById('themeStartOfWeekVal');
  const themeTopBgVal = document.getElementById('themeTopBgVal');
  const themeTopTextVal = document.getElementById('themeTopTextVal');
  const themeGridBgVal = document.getElementById('themeGridBgVal');
  const themeBgImageVal = document.getElementById('themeBgImageVal');
  const themeCellOpacityVal = document.getElementById('themeCellOpacityVal');

  document.getElementById('openThemeBtn').addEventListener('click', () => {
    themeStartOfWeekVal.value = currentTheme.startOfWeek !== undefined ? currentTheme.startOfWeek : 0;
    themeTopBgVal.value = currentTheme.topBg;
    themeTopTextVal.value = currentTheme.topText;
    themeGridBgVal.value = currentTheme.gridBg;
    themeCellOpacityVal.value = currentTheme.cellOpacity;
    themeModalOverlay.style.display = 'flex';
  });

  document.getElementById('closeThemeBtn').addEventListener('click', () => themeModalOverlay.style.display = 'none');

  // 週の始まり曜日切り替えイベント
  themeStartOfWeekVal.addEventListener('change', (e) => { 
    currentTheme.startOfWeek = parseInt(e.target.value); 
    saveTheme(); renderCalendar(); 
  });

  themeTopBgVal.addEventListener('input', (e) => { currentTheme.topBg = e.target.value; applyTheme(); saveTheme(); });
  themeTopTextVal.addEventListener('input', (e) => { currentTheme.topText = e.target.value; applyTheme(); saveTheme(); });
  themeGridBgVal.addEventListener('input', (e) => { currentTheme.gridBg = e.target.value; applyTheme(); saveTheme(); });
  themeCellOpacityVal.addEventListener('input', (e) => { currentTheme.cellOpacity = e.target.value; applyTheme(); saveTheme(); });

  themeBgImageVal.addEventListener('change', (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
      currentTheme.bgImage = event.target.result;
      if(currentTheme.cellOpacity === 100) { currentTheme.cellOpacity = 85; themeCellOpacityVal.value = 85; }
      applyTheme(); saveTheme();
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('clearBgImageBtn').addEventListener('click', () => {
    currentTheme.bgImage = null; themeBgImageVal.value = ''; applyTheme(); saveTheme();
  });

  applyTheme();

  // --- 祝日データ取得処理 ---
  let holidays = JSON.parse(localStorage.getItem('calendarHolidays')) || {};
  async function fetchHolidays() {
    try {
      const res = await fetch('https://holidays-jp.github.io/api/v1/date.json');
      holidays = await res.json();
      localStorage.setItem('calendarHolidays', JSON.stringify(holidays));
      renderCalendar();
    } catch (e) { console.error("祝日取得失敗", e); }
  }
  fetchHolidays();

  // --- ToDoの表示切り替え処理 ---
  const toggleTodoBtn = document.getElementById('toggleTodoBtn');
  const todoSidebar = document.getElementById('todoSidebar');
  const mobileCloseTodoBtn = document.getElementById('mobileCloseTodoBtn');
  
  function toggleTodoSidebar() {
    todoSidebar.classList.toggle('active');
    if (todoSidebar.classList.contains('active')) {
      toggleTodoBtn.textContent = '📝 隠す'; toggleTodoBtn.classList.remove('btn-outline');
    } else {
      toggleTodoBtn.textContent = '📝 ToDo'; toggleTodoBtn.classList.add('btn-outline');
    }
  }
  toggleTodoBtn.addEventListener('click', toggleTodoSidebar);
  mobileCloseTodoBtn.addEventListener('click', toggleTodoSidebar);

  // --- 共通ユーティリティ ---
  function getOffsetDateStr(offsetDays) {
    const d = new Date(); d.setDate(d.getDate() + offsetDays);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  // --- データ管理 ---
  const defaultCategories = [ { id: 'cat_1', name: 'プライベート', color: '#3498db' }, { id: 'cat_2', name: '仕事', color: '#2ecc71' } ];
  let categories = JSON.parse(localStorage.getItem('calendarCategories')) || defaultCategories;
  let events = JSON.parse(localStorage.getItem('calendarEvents')) || {};
  
  const defaultTodos = [
    { id: 'todo_1', title: 'カードゲーム「The Trenches」のテストプレイ', deadline: getOffsetDateStr(2), completed: false },
    { id: 'todo_2', title: '小説執筆（誰も死ななくなった1年後）', deadline: getOffsetDateStr(4), completed: false }
  ];
  let todos = JSON.parse(localStorage.getItem('calendarTodos'));
  if (!todos) { todos = defaultTodos; localStorage.setItem('calendarTodos', JSON.stringify(todos)); }

  function saveCategories() { localStorage.setItem('calendarCategories', JSON.stringify(categories)); }
  function saveEvents() { localStorage.setItem('calendarEvents', JSON.stringify(events)); }
  function saveTodos() { localStorage.setItem('calendarTodos', JSON.stringify(todos)); }
  function getCategoryById(id) { return categories.find(c => c.id === id) || { name: '未分類', color: '#999' }; }

  // --- スワイプ処理 ---
  const daysContainer = document.getElementById('days');
  let touchStartX = 0; let touchStartY = 0; let touchEndX = 0; let touchEndY = 0; let isSwiping = false;

  daysContainer.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; isSwiping = false; }, {passive: true});
  daysContainer.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; touchEndY = e.changedTouches[0].screenY; handleSwipe(); }, {passive: true});

  function handleSwipe() {
    const deltaX = touchEndX - touchStartX; const deltaY = touchEndY - touchStartY;
    if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY)) {
      isSwiping = true;
      if (deltaX > 0) { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); } 
      else { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
    }
  }

  // --- カレンダー描画処理 ---
  const monthYearDisplay = document.getElementById('monthYear');
  const weekdaysContainer = document.getElementById('weekdaysContainer');
  let currentDate = new Date();
  let selectedDateString = '';

  function renderCalendar() {
    const month = currentDate.getMonth(); const year = currentDate.getFullYear();
    const today = new Date();
    const isMonStart = currentTheme.startOfWeek === 1;
    
    // ヘッダーの年月
    monthYearDisplay.textContent = `${year}年 ${month + 1}月`;
    
    // ★追加: 曜日の動的描画（日・月始まりに対応）
    weekdaysContainer.innerHTML = '';
    const daysOfWeek = isMonStart ? ['月', '火', '水', '木', '金', '土', '日'] : ['日', '月', '火', '水', '木', '金', '土'];
    daysOfWeek.forEach((day) => {
      const div = document.createElement('div');
      div.textContent = day;
      if (day === '日') div.style.color = 'var(--danger-color)';
      if (day === '土') div.style.color = '#3498db';
      weekdaysContainer.appendChild(div);
    });

    // カレンダーの計算
    daysContainer.innerHTML = '';
    const firstDay = new Date(year, month, 1).getDay(); // 0(日) 〜 6(土)
    const lastDay = new Date(year, month + 1, 0).getDate();
    
    let firstDayIndex = firstDay;
    if (isMonStart) {
      firstDayIndex = firstDay === 0 ? 6 : firstDay - 1; // 月曜始まりの場合のズレを計算
    }
    
    // 月始めの空白マス
    for (let x = 0; x < firstDayIndex; x++) {
      const emptyDiv = document.createElement('div'); emptyDiv.classList.add('day', 'empty');
      daysContainer.appendChild(emptyDiv);
    }
    
    // 日付マス
    for (let i = 1; i <= lastDay; i++) {
      const dayDiv = document.createElement('div'); dayDiv.classList.add('day');
      const mm = String(month + 1).padStart(2, '0'); const dd = String(i).padStart(2, '0');
      const dateString = `${year}-${mm}-${dd}`;
      
      const currentDayOfWeek = new Date(year, month, i).getDay();
      if (currentDayOfWeek === 0) dayDiv.classList.add('sunday');
      if (currentDayOfWeek === 6) dayDiv.classList.add('saturday');
      if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) dayDiv.classList.add('today');
      
      let holidayNameHTML = '';
      if (holidays[dateString]) {
        dayDiv.classList.add('holiday');
        holidayNameHTML = `<span class="holiday-name">${holidays[dateString]}</span>`;
      }

      const dateHeader = document.createElement('div'); dateHeader.classList.add('date-header');
      dateHeader.innerHTML = `<span class="date-number">${i}</span>${holidayNameHTML}`;
      dayDiv.appendChild(dateHeader);

      const eventsContainer = document.createElement('div'); eventsContainer.classList.add('events-container');
      let dayItems = events[dateString] ? events[dateString].map(e => ({ ...e, itemType: 'event' })) : [];
      const dayTodos = todos.filter(t => t.deadline === dateString);
      dayItems = dayItems.concat(dayTodos.map(t => ({ ...t, itemType: 'todo' })));

      const sortedItems = dayItems.sort((a, b) => {
        const rankA = (a.itemType === 'event' && a.isAllDay) ? 1 : (a.itemType === 'todo' ? 2 : 3);
        const rankB = (b.itemType === 'event' && b.isAllDay) ? 1 : (b.itemType === 'todo' ? 2 : 3);
        if (rankA !== rankB) return rankA - rankB;
        if (rankA === 3 && rankB === 3) return a.startTime.localeCompare(b.startTime);
        return 0;
      });

      sortedItems.forEach(item => {
        const elDiv = document.createElement('div'); elDiv.classList.add('event');
        if (item.itemType === 'todo') {
          elDiv.classList.add('todo');
          if (item.completed) elDiv.classList.add('completed');
          elDiv.textContent = item.title; 
        } else {
          const category = getCategoryById(item.categoryId);
          if (item.isAllDay) { elDiv.classList.add('all-day'); elDiv.style.backgroundColor = category.color; } 
          else { elDiv.style.borderLeftColor = category.color; elDiv.style.backgroundColor = category.color + '20'; }
          elDiv.textContent = item.title;
        }
        eventsContainer.appendChild(elDiv);
      });
      
      dayDiv.appendChild(eventsContainer);
      dayDiv.addEventListener('click', (e) => { if (!isSwiping) openDayViewModal(dateString); });
      daysContainer.appendChild(dayDiv);
    }
    
    // 月末の空白マス
    const totalRenderedCells = firstDayIndex + lastDay;
    const remainingEmptyCells = totalRenderedCells % 7 === 0 ? 0 : 7 - (totalRenderedCells % 7);
    for (let j = 0; j < remainingEmptyCells; j++) {
      const emptyDiv = document.createElement('div'); emptyDiv.classList.add('day', 'empty');
      daysContainer.appendChild(emptyDiv);
    }
  }

  // --- 予定一覧（Day View）モーダル処理 ---
  const dayViewModalOverlay = document.getElementById('dayViewModalOverlay');
  const dayViewDateDisplay = document.getElementById('dayViewDateDisplay');
  const dayViewList = document.getElementById('dayViewList');

  function openDayViewModal(dateString) {
    selectedDateString = dateString;
    let titleText = `${dateString.replace(/-/g, '/')} の予定`;
    if (holidays[dateString]) titleText += ` (${holidays[dateString]})`;
    dayViewDateDisplay.textContent = titleText;
    renderDayViewList();
    dayViewModalOverlay.style.display = 'flex';
  }

  function renderDayViewList() {
    dayViewList.innerHTML = '';
    let dayItems = events[selectedDateString] ? events[selectedDateString].map(e => ({ ...e, itemType: 'event' })) : [];
    const dayTodos = todos.filter(t => t.deadline === selectedDateString);
    dayItems = dayItems.concat(dayTodos.map(t => ({ ...t, itemType: 'todo' })));

    const sortedItems = dayItems.sort((a, b) => {
      const rankA = (a.itemType === 'event' && a.isAllDay) ? 1 : (a.itemType === 'todo' ? 2 : 3);
      const rankB = (b.itemType === 'event' && b.isAllDay) ? 1 : (b.itemType === 'todo' ? 2 : 3);
      if (rankA !== rankB) return rankA - rankB;
      if (rankA === 3 && rankB === 3) return a.startTime.localeCompare(b.startTime);
      return 0;
    });

    if (sortedItems.length === 0) { dayViewList.innerHTML = '<p style="color:#999; text-align:center; padding: 20px 0;">予定はありません</p>'; return; }

    sortedItems.forEach(item => {
      const itemDiv = document.createElement('div'); itemDiv.classList.add('view-item');
      if (item.itemType === 'todo') {
        itemDiv.innerHTML = `<input type="checkbox" class="todo-checkbox" ${item.completed ? 'checked' : ''} data-id="${item.id}" style="width:18px; height:18px; transform:scale(1.2);"><div style="flex:1; ${item.completed ? 'text-decoration:line-through; opacity:0.5;' : ''}"><div style="font-weight:bold; color:var(--todo-color);">[ToDo] ${item.title}</div></div>`;
      } else {
        const category = getCategoryById(item.categoryId);
        const timeStr = item.isAllDay ? '終日' : `${item.startTime}${item.endTime ? ' - ' + item.endTime : ''}`;
        itemDiv.innerHTML = `<span class="category-color-box" style="background-color: ${category.color}; flex-shrink: 0;"></span><div style="flex:1;"><div style="font-size:0.8rem; color:#666;">${timeStr}</div><div style="font-weight:bold;">${item.title}</div></div>`;
      }
      dayViewList.appendChild(itemDiv);
    });

    dayViewList.querySelectorAll('.todo-checkbox').forEach(cb => { cb.addEventListener('change', (e) => { toggleTodoStatus(e.target.dataset.id, e.target.checked); renderDayViewList(); }); });
  }

  document.getElementById('closeDayViewBtn').addEventListener('click', () => dayViewModalOverlay.style.display = 'none');
  document.getElementById('openAddEventBtn').addEventListener('click', () => { dayViewModalOverlay.style.display = 'none'; openEventModal(selectedDateString); });

  // --- カテゴリー別一覧(Filter)モーダル処理 ---
  const categoryFilterModalOverlay = document.getElementById('categoryFilterModalOverlay');
  const filterCategorySelect = document.getElementById('filterCategorySelect');
  const filteredEventList = document.getElementById('filteredEventList');

  document.getElementById('openCategoryFilterBtn').addEventListener('click', () => {
    filterCategorySelect.innerHTML = '<option value="all">すべて</option>';
    categories.forEach(cat => { filterCategorySelect.innerHTML += `<option value="${cat.id}">${cat.name}</option>`; });
    renderFilteredEvents();
    categoryFilterModalOverlay.style.display = 'flex';
  });

  document.getElementById('closeCategoryFilterBtn').addEventListener('click', () => categoryFilterModalOverlay.style.display = 'none');
  filterCategorySelect.addEventListener('change', renderFilteredEvents);

  function renderFilteredEvents() {
    filteredEventList.innerHTML = '';
    const selectedCatId = filterCategorySelect.value;
    let matchedEvents = [];

    Object.keys(events).forEach(date => { events[date].forEach(ev => { if (selectedCatId === 'all' || ev.categoryId === selectedCatId) matchedEvents.push({ date, ...ev }); }); });
    matchedEvents.sort((a, b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      if (a.isAllDay !== b.isAllDay) return a.isAllDay ? -1 : 1;
      if (!a.isAllDay && !b.isAllDay) return a.startTime.localeCompare(b.startTime);
      return 0;
    });

    if (matchedEvents.length === 0) { filteredEventList.innerHTML = '<p style="color:#999; text-align:center; padding: 20px 0;">予定が見つかりません</p>'; return; }

    matchedEvents.forEach(item => {
      const itemDiv = document.createElement('div'); itemDiv.classList.add('view-item');
      const category = getCategoryById(item.categoryId);
      const timeStr = item.isAllDay ? '終日' : item.startTime;
      itemDiv.innerHTML = `<span class="category-color-box" style="background-color: ${category.color}; flex-shrink: 0;"></span><div style="flex:1;"><div style="font-size:0.75rem; color:#666;">${item.date.replace(/-/g, '/')} ${timeStr}</div><div style="font-weight:bold;">${item.title}</div></div>`;
      filteredEventList.appendChild(itemDiv);
    });
  }

  // --- ToDoリスト処理 ---
  const todoListContainer = document.getElementById('todoList');
  const newTodoTitleInput = document.getElementById('newTodoTitle');
  const newTodoDeadlineInput = document.getElementById('newTodoDeadline');

  function renderTodos() {
    todoListContainer.innerHTML = '';
    const todayStr = getOffsetDateStr(0);

    const sortedTodos = [...todos].sort((a, b) => {
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return a.deadline.localeCompare(b.deadline);
    });

    sortedTodos.forEach(todo => {
      const item = document.createElement('div'); item.className = `todo-item ${todo.completed ? 'completed' : ''}`;
      let deadlineHTML = '';
      if (todo.deadline) {
        const isOverdue = !todo.completed && todo.deadline < todayStr;
        const isToday = !todo.completed && todo.deadline === todayStr;
        let deadlineClass = isOverdue || isToday ? 'overdue' : '';
        let icon = isOverdue ? '⚠️ ' : (isToday ? '🔥 ' : '📅 ');
        deadlineHTML = `<div class="todo-deadline ${deadlineClass}">${icon}${todo.deadline}</div>`;
      }
      item.innerHTML = `<input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} data-id="${todo.id}"><div class="todo-content"><div class="todo-title">${todo.title}</div>${deadlineHTML}</div><button class="todo-delete" data-id="${todo.id}">×</button>`;
      todoListContainer.appendChild(item);
    });

    document.querySelectorAll('#todoList .todo-checkbox').forEach(cb => { cb.addEventListener('change', (e) => toggleTodoStatus(e.target.dataset.id, e.target.checked)); });
    document.querySelectorAll('.todo-delete').forEach(btn => { btn.addEventListener('click', (e) => deleteTodo(e.target.dataset.id)); });
  }

  function toggleTodoStatus(id, isCompleted) { const todo = todos.find(t => t.id === id); if (todo) { todo.completed = isCompleted; saveTodos(); renderTodos(); renderCalendar(); } }
  function deleteTodo(id) { todos = todos.filter(t => t.id !== id); saveTodos(); renderTodos(); renderCalendar(); }
  document.getElementById('addTodoBtn').addEventListener('click', () => {
    const title = newTodoTitleInput.value.trim();
    if (!title) return alert('タスク名を入力してください');
    todos.push({ id: 'todo_' + Date.now(), title: title, deadline: newTodoDeadlineInput.value || null, completed: false });
    saveTodos(); renderTodos(); renderCalendar();
    newTodoTitleInput.value = ''; newTodoDeadlineInput.value = '';
  });

  // --- カレンダー操作・その他モーダル処理 ---
  document.getElementById('prev').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });
  document.getElementById('next').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });
  document.getElementById('todayBtn').addEventListener('click', () => { currentDate = new Date(); renderCalendar(); });

  const eventModalOverlay = document.getElementById('eventModalOverlay');
  const modalDateDisplay = document.getElementById('modalDateDisplay');
  const eventTitleInput = document.getElementById('eventTitle');
  const eventAllDayCheckbox = document.getElementById('eventAllDay');
  const timeInputsDiv = document.getElementById('timeInputs');
  const eventStartTimeInput = document.getElementById('eventStartTime');
  const eventEndTimeInput = document.getElementById('eventEndTime');
  const eventCategorySelect = document.getElementById('eventCategory');
  
  // ★追加・修正: カテゴリー管理モーダル内の編集機能関連
  const categoryModalOverlay = document.getElementById('categoryModalOverlay');
  const categoryList = document.getElementById('categoryList');
  let editingCategoryId = null; // 編集中のカテゴリーIDを保持

  function renderCategoryManagement() {
    categoryList.innerHTML = ''; eventCategorySelect.innerHTML = '';
    categories.forEach(cat => {
      const item = document.createElement('div'); item.className = 'category-item';
      item.innerHTML = `
        <div><span class="category-color-box" style="background-color: ${cat.color};"></span>${cat.name}</div>
        <div>
          <button class="cat-action-btn edit-cat-btn" data-id="${cat.id}">編集</button>
          <button class="cat-action-btn delete-cat-btn" data-id="${cat.id}">削除</button>
        </div>
      `;
      categoryList.appendChild(item);
      const option = document.createElement('option'); option.value = cat.id; option.textContent = cat.name;
      eventCategorySelect.appendChild(option);
    });
    
    // 削除ボタン
    document.querySelectorAll('.delete-cat-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { 
        if(!confirm('このカテゴリーを削除しますか？')) return;
        categories = categories.filter(c => c.id !== e.target.dataset.id); 
        saveCategories(); renderCategoryManagement(); renderCalendar(); 
      });
    });

    // 編集ボタン
    document.querySelectorAll('.edit-cat-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const cat = categories.find(c => c.id === e.target.dataset.id);
        if (cat) {
          editingCategoryId = cat.id;
          document.getElementById('newCategoryName').value = cat.name;
          document.getElementById('newCategoryColor').value = cat.color;
          document.getElementById('addCategoryBtn').textContent = '更新';
          document.getElementById('categoryFormLabel').textContent = 'カテゴリーを編集';
          document.getElementById('cancelEditCategoryBtn').style.display = 'block';
        }
      });
    });
  }

  document.getElementById('manageCategoriesBtn').addEventListener('click', () => { renderCategoryManagement(); categoryModalOverlay.style.display = 'flex'; });
  
  document.getElementById('closeCategoryBtn').addEventListener('click', () => { 
    categoryModalOverlay.style.display = 'none'; 
    resetCategoryForm();
  });

  // 編集キャンセルボタン
  document.getElementById('cancelEditCategoryBtn').addEventListener('click', resetCategoryForm);

  // カテゴリー追加 / 更新ボタン
  document.getElementById('addCategoryBtn').addEventListener('click', () => {
    const nameInput = document.getElementById('newCategoryName'); 
    const colorInput = document.getElementById('newCategoryColor');
    const nameValue = nameInput.value.trim();
    if (!nameValue) return alert('カテゴリー名を入力してください');
    
    if (editingCategoryId) {
      // 編集モード
      const cat = categories.find(c => c.id === editingCategoryId);
      if(cat) {
        cat.name = nameValue;
        cat.color = colorInput.value;
      }
    } else {
      // 新規追加モード
      categories.push({ id: 'cat_' + Date.now(), name: nameValue, color: colorInput.value });
    }
    
    saveCategories(); renderCategoryManagement(); renderCalendar(); 
    resetCategoryForm();
  });

  // カテゴリー入力フォームを初期状態に戻す
  function resetCategoryForm() {
    editingCategoryId = null;
    document.getElementById('newCategoryName').value = '';
    document.getElementById('newCategoryColor').value = '#3498db';
    document.getElementById('addCategoryBtn').textContent = '追加';
    document.getElementById('categoryFormLabel').textContent = '新規追加';
    document.getElementById('cancelEditCategoryBtn').style.display = 'none';
  }

  function openEventModal(dateString) {
    modalDateDisplay.textContent = `${dateString.replace(/-/g, '/')} の予定を追加`;
    eventTitleInput.value = ''; eventAllDayCheckbox.checked = true; timeInputsDiv.style.display = 'none';
    eventStartTimeInput.value = ''; eventEndTimeInput.value = '';
    renderCategoryManagement(); eventModalOverlay.style.display = 'flex';
  }

  eventAllDayCheckbox.addEventListener('change', (e) => timeInputsDiv.style.display = e.target.checked ? 'none' : 'block');
  document.getElementById('cancelEventBtn').addEventListener('click', () => eventModalOverlay.style.display = 'none');
  
  document.getElementById('saveEventBtn').addEventListener('click', () => {
    const title = eventTitleInput.value.trim(); const isAllDay = eventAllDayCheckbox.checked; const startTime = eventStartTimeInput.value;
    if (!title) return alert('タイトルを入力してください。');
    if (!isAllDay && !startTime) return alert('時間を指定する場合は開始時間を入力してください。');
    if (!events[selectedDateString]) events[selectedDateString] = [];
    events[selectedDateString].push({ id: Date.now().toString(), title, categoryId: eventCategorySelect.value, isAllDay, startTime: isAllDay ? null : startTime, endTime: isAllDay ? null : eventEndTimeInput.value });
    saveEvents(); renderCalendar(); eventModalOverlay.style.display = 'none';
  });

  renderCategoryManagement();
  renderTodos();
</script>

</body>
</html>
